<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>타임라인</title>
<style>
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,'Noto Sans KR',sans-serif;background:#0f172a;color:#e5e7eb;}
  .wrap{max-width:1200px;margin:auto;padding:16px;box-sizing:border-box;}
  .header{font-size:20px;font-weight:1000;margin:0 0 10px;}
  .card{background:#020617;border:1px solid rgba(255,255,255,.10);border-radius:16px;padding:16px;box-sizing:border-box;}
  .small{opacity:.85;font-size:13px;line-height:1.45}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  input,select,textarea,button{
    padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,.10);box-sizing:border-box;
    background:#0b1220;color:#e5e7eb;
  }
  input,select{flex:1;min-width:160px}
  textarea{width:100%;min-height:90px;resize:vertical}
  button{cursor:pointer;font-weight:1000}
  button:hover{filter:brightness(1.08)}
  button.danger{background:#7c2d12}
  button.danger:hover{background:#991b1b}
  button.ghost{background:transparent}
  button.ghost:hover{background:#0b1220}
  .hr{height:1px;background:rgba(255,255,255,.08);margin:10px 0;}

  .list{border-top:1px solid rgba(255,255,255,.10);padding-top:10px;margin-top:10px;}
  .item{padding:10px 10px;border-bottom:1px solid rgba(255,255,255,.06);border-radius:12px;cursor:pointer;}
  .item:hover{background:#0b1220}
  .item.selected{outline:2px solid rgba(37,99,235,.75);background:#0b1220}
  .meta{opacity:.75;font-size:12px;margin-bottom:4px}
  .txt{font-size:14px;line-height:1.35;white-space:pre-wrap}
  .pager{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:10px}
  .pager button{width:auto;padding:8px 10px}
  .pager .info{opacity:.85;font-size:13px}
  .badge{display:inline-block;font-size:12px;opacity:.9;background:#0b1220;border:1px solid rgba(255,255,255,.10);padding:2px 8px;border-radius:999px;margin-left:8px}
  .row2{display:flex;align-items:center;gap:10px}
  .cellText{flex:1;min-width:0}
  .cellBtn{width:84px;text-align:right}
  .empty{opacity:.7;padding:12px 0}

/* === WHITE ERP THEME (global override) === */
:root{
  --bg:#f8fafc;
  --panel:#ffffff;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --line:#e5e7eb;
  --blue:#2563eb;
  --red:#ef4444;
}
body{background:var(--bg) !important; color:var(--text) !important;}
.card{background:var(--card) !important; border:1px solid var(--line) !important;}
input,select,textarea{
  background:#ffffff !important;
  color:var(--text) !important;
  border:1px solid var(--line) !important;
}
button{
  background:#f3f4f6 !important;
  border:1px solid #d1d5db !important;
  color:var(--text) !important;
}
button:hover{filter:none !important; background:#e5e7eb !important;}
button.primary{background:var(--blue) !important; color:#fff !important; border:none !important;}
button.danger{background:var(--red) !important; color:#fff !important; border:none !important;}
button.ghost{background:transparent !important;}
table th{background:#f3f4f6 !important; color:#374151 !important;}
tr:hover td{background:#f9fafb !important;}
/* === TOP BAR (standalone + iframe) === */
.wlpTopbar{
  position:fixed; left:0; right:0; top:0; height:54px;
  background:#ffffff; border-bottom:1px solid var(--line);
  display:flex; align-items:center; gap:10px; padding:0 12px;
  z-index:9999;
}
.wlpBrand{font-weight:900; letter-spacing:.2px;}
.wlpNav{display:flex; gap:6px; flex-wrap:wrap; align-items:center}
.wlpNav a, .wlpNav button{
  text-decoration:none;
  padding:8px 10px;
  border-radius:10px;
  border:1px solid #d1d5db;
  background:#f9fafb;
  color:#111827;
  font-weight:800;
  font-size:13px;
  cursor:pointer;
}
.wlpNav a:hover, .wlpNav button:hover{background:#eef2ff; border-color:#c7d2fe;}
.wlpTitlebar{
  position:sticky; top:54px;
  background:rgba(248,250,252,.92);
  backdrop-filter:saturate(140%) blur(6px);
  border-bottom:1px solid var(--line);
  padding:10px 16px;
  z-index:999;
}
.wlpTitlebar .t1{font-size:16px; font-weight:900; margin:0;}
.wlpTitlebar .t2{font-size:12px; color:var(--muted); margin-top:4px;}
.wlpBodyPad{padding-top:54px;}

</head>
<body class="wlpBodyPad">

<div class="wlpTopbar">
  <div class="wlpBrand">WorkLog PRO</div>
  <div class="wlpNav" role="navigation" aria-label="WorkLog PRO Navigation">
    <a href="home.html" onclick="return navTo('home.html')">HOME</a>
    <a href="worklog.html" onclick="return navTo('worklog.html')">업무일지</a>
    <a href="materials.html" onclick="return navTo('materials.html')">자재일지</a>
    <a href="items.html" onclick="return navTo('items.html')">항목관리</a>
    <a href="schedule.html" onclick="return navTo('schedule.html')">일정표</a>
    <a href="timeline.html" onclick="return navTo('timeline.html')">타임라인</a>
  </div>
</div>

<div class="wlpTitlebar">
  <div class="t1">타임라인</div>
  <div class="t2">화이트 ERP 테마 · 상단 고정 네비 · 타이틀 바</div>
</div>

<div class="wrap">
  <div class="header">타임라인</div>
  <div class="small">시간 순서대로 중요한 일을 기록합니다. 리스트 항목을 클릭하면 입력창에 불러와서 수정할 수 있습니다.</div>

  <div class="card" style="margin-top:12px">

    <div class="small">입력</div>
    <div class="row" style="margin-top:10px">
      <div style="flex:1;min-width:160px">
        날짜
        <input type="date" id="tlDate">
      </div>
      <div style="flex:1;min-width:160px">
        시간
        <input type="time" id="tlTime">
      </div>
    </div>

    내용
    <textarea id="tlText" placeholder="중요한 일을 기록"></textarea>

    <div class="row" style="margin-top:10px">
      <button id="btnSave" onclick="saveTL()">저장</button>
      <button id="btnUpdate" class="ghost" onclick="updateTL()" style="display:none">수정</button>
      <button id="btnDelete" class="danger" onclick="deleteSelected()" style="display:none">삭제</button>
      <button class="ghost" onclick="rewrite()">다시쓰기</button>
      <button class="danger" onclick="purgeTL()">전체 삭제</button>
      <span class="badge" id="selBadge" style="display:none">선택됨</span>
    </div>

    <div class="hr"></div>

    <div class="small">백업 / 불러오기</div>
    <div class="row">
      <button onclick="backupTL()">백업 다운로드</button>
      <input id="restoreFile" type="file" accept="application/json">
      <button class="danger" onclick="restoreTL()">불러오기(복원)</button>
    </div>

    <div class="hr"></div>

    <div class="row">
      <select id="perPage" onchange="goPage(1)">
        <option value="10">10개</option>
        <option value="20">20개</option>
        <option value="30">30개</option>
        <option value="50">50개</option>
        <option value="100">100개</option>
      </select>
      <input id="q" placeholder="검색어 (내용 검색)" oninput="goPage(1)">
      <button onclick="goPage(1)">적용</button>
    </div>

    <div class="list" id="list"></div>

    <div class="pager">
      <button onclick="prevPage()">◀</button>
      <button onclick="nextPage()">▶</button>
      <div class="info" id="pageInfo"></div>
    </div>
  </div>
</div>

<script src="app_core.js"></script>
<script>
const KEY = window.APP.KEYS.TIMELINE;

let db = window.APP.store.getJSON(KEY, []);
let page = 1;
let selectedId = null;

function save(){ window.APP.store.setJSON(KEY, db); window.APP.backup.capture('timeline'); }

function todayStr(){ return window.APP.util.todayISO(); }
function short15(t){ return window.APP.util.short(t, 15); }

function setEditMode(on){
  document.getElementById('btnSave').style.display   = on ? 'none' : 'inline-block';
  document.getElementById('btnUpdate').style.display = on ? 'inline-block' : 'none';
  document.getElementById('btnDelete').style.display = on ? 'inline-block' : 'none';
  document.getElementById('selBadge').style.display  = on ? 'inline-block' : 'none';
}

function rewrite(){
  selectedId = null;
  document.getElementById('tlDate').value = todayStr();
  document.getElementById('tlTime').value = '';
  document.getElementById('tlText').value = '';
  setEditMode(false);
  render();
}

function pick(id){
  const it = db.find(x=>x.id===id);
  if(!it) return;
  selectedId = id;
  document.getElementById('tlDate').value = it.date || todayStr();
  document.getElementById('tlTime').value = it.time || '';
  document.getElementById('tlText').value = it.text || '';
  setEditMode(true);
  render();
}

function saveTL(){
  const date = document.getElementById('tlDate').value;
  let time = document.getElementById('tlTime').value;
  const text = document.getElementById('tlText').value.trim();
  if(!date || !text){ alert('날짜와 내용을 입력'); return; }
  if(!time) time = '00:00';

  const id = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now())+Math.random());
  db.push({id, date, time, text, ts: Date.now()});
  save();
  window.APP.log.add('TIMELINE', `타임라인 저장: ${date} ${time} / ${short15(text)}`);
  rewrite();
}

function updateTL(){
  if(!selectedId) return alert('수정할 항목 선택');
  const date = document.getElementById('tlDate').value;
  let time = document.getElementById('tlTime').value;
  const text = document.getElementById('tlText').value.trim();
  if(!date || !text){ alert('날짜와 내용을 입력'); return; }
  if(!time) time = '00:00';

  const idx = db.findIndex(x=>x.id===selectedId);
  if(idx < 0) return;

  db[idx] = {...db[idx], date, time, text, ts: Date.now()};
  save();
  window.APP.log.add('TIMELINE', `타임라인 수정: ${date} ${time} / ${short15(text)}`);
  rewrite();
}

function deleteSelected(){
  if(!selectedId) return alert('삭제할 항목 선택');
  if(!confirm('선택한 항목 삭제?')) return;
  const it = db.find(x=>x.id===selectedId);
  db = db.filter(x=>x.id!==selectedId);
  save();
  window.APP.log.add('TIMELINE', `타임라인 삭제: ${it?it.date:''} ${it?it.time:''} / ${it?short15(it.text):''}`);
  rewrite();
}

function deleteDirect(id){
  if(!confirm('삭제할까요?')) return;
  const it = db.find(x=>x.id===id);
  db = db.filter(x=>x.id!==id);
  save();
  window.APP.log.add('TIMELINE', `타임라인 삭제: ${it?it.date:''} ${it?it.time:''} / ${it?short15(it.text):''}`);
  if(selectedId === id) rewrite();
  render();
}

function purgeTL(){
  if(!confirm('타임라인 전체 삭제?')) return;
  db = [];
  save();
  window.APP.log.add('TIMELINE', '타임라인 전체 삭제');
  rewrite();
}

function downloadJson(filename, obj){
  const blob = new Blob([JSON.stringify(obj, null, 2)], {type:"application/json"});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(a.href);
}

function backupTL(){
  const obj = {meta:{app:"WorkLogPRO",schema:window.APP.SCHEMA_VERSION,createdAt:new Date().toISOString()}, key:KEY, data: db};
  downloadJson(`timeline_${window.APP.util.stamp()}.json`, obj);
  window.APP.log.add('BACKUP', '타임라인 백업 다운로드');
}

function restoreTL(){
  const file = document.getElementById('restoreFile').files[0];
  if(!file) return alert('복원 파일을 선택해 주세요.');
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const obj = JSON.parse(reader.result);
      const data = obj && obj.data ? obj.data : obj;
      if(!Array.isArray(data)) return alert('파일 형식이 올바르지 않습니다.');
      if(!confirm('기존 타임라인이 덮어써집니다. 불러올까요?')) return;
      db = data;
      save();
      window.APP.log.add('BACKUP', '타임라인 불러오기(복원) 완료');
      rewrite();
    }catch(e){
      alert('복원 실패: 파일을 읽을 수 없습니다.');
    }
  };
  reader.readAsText(file, 'utf-8');
}

function filtered(){
  const q = document.getElementById('q').value.trim().toLowerCase();
  let arr = db.slice();
  if(q) arr = arr.filter(x => (x.text||'').toLowerCase().includes(q));
  arr.sort((a,b)=>((a.date+a.time)>(b.date+b.time))?1:-1);
  return arr;
}

function render(){
  const list = document.getElementById('list');
  const per = parseInt(document.getElementById('perPage').value, 10);
  const arr = filtered();
  const total = arr.length;
  const totalPages = Math.max(1, Math.ceil(total / per));
  if(page > totalPages) page = totalPages;

  const start = (page-1)*per;
  const slice = arr.slice(start, start+per);

  list.innerHTML = '';
  if(slice.length === 0){
    list.innerHTML = '<div class="empty">표시할 타임라인이 없습니다.</div>';
  }else{
    slice.forEach(x=>{
      const div = document.createElement('div');
      div.className = 'item' + (x.id===selectedId ? ' selected' : '');
      div.onclick = ()=>pick(x.id);
      div.innerHTML = `
        <div class="row2">
          <div class="cellText">
            <div class="meta">${window.APP.util.escapeHtml(x.date)} ${window.APP.util.escapeHtml(x.time)}</div>
            <div class="txt">${window.APP.util.escapeHtml(x.text)}</div>
          </div>
          <div class="cellBtn">
            <button class="danger" style="width:auto" onclick="event.stopPropagation(); deleteDirect('${x.id}')">삭제</button>
          </div>
        </div>
      `;
      list.appendChild(div);
    });
  }
  document.getElementById('pageInfo').textContent = `페이지 ${page} / ${totalPages} (총 ${total}건)`;
}

function goPage(p){ page = p; render(); }
function prevPage(){ if(page>1){page--; render();} }
function nextPage(){
  const per = parseInt(document.getElementById('perPage').value, 10);
  const totalPages = Math.max(1, Math.ceil(filtered().length / per));
  if(page<totalPages){page++; render();}
}

document.addEventListener('DOMContentLoaded', ()=>{
  window.APP.migrate.run();
  document.getElementById('tlDate').value = todayStr();
  setEditMode(false);
  render();
});
</script>

<script>
function navTo(file){
  try{
    if(window.parent && window.parent !== window && typeof window.parent.go === 'function'){
      window.parent.go(file);
      return false;
    }
  }catch(e){}
  window.location.href = file;
  return false;
}
</script>
