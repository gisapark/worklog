<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>WorkLog PRO</title>
  <style>
    :root{
      --bg:#0f172a; --panel:#020617; --panel2:#0b1220;
      --line:rgba(255,255,255,.10); --text:#e5e7eb; --muted:#9ca3af;
      --accent:#2563eb;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text)}
    .sidebar{
      position:fixed; left:0; top:0; height:100vh; width:90px;
      background:var(--panel); border-right:1px solid var(--line);
      display:flex; flex-direction:column; gap:10px; padding:12px 10px;
      z-index:999;
    }
    .btn{
      width:100%; height:64px; border:1px solid var(--line); border-radius:14px;
      background:var(--panel2); color:var(--text); font-weight:900; cursor:pointer;
      font-size:12px; line-height:1.1;
    }
    .btn:hover{filter:brightness(1.08)}
    .btn.active{outline:2px solid rgba(37,99,235,.95)}
    .bottom{margin-top:auto; display:flex; flex-direction:column; gap:8px; padding-top:6px}
    .small{
      width:100%; border:1px solid var(--line); border-radius:12px; padding:10px 6px;
      background:var(--panel2); color:var(--text); font-weight:900; cursor:pointer;
      font-size:12px; line-height:1.1;
    }
    .small:hover{filter:brightness(1.08)}
    .main{ margin-left:90px; height:100vh; }
    iframe{ width:100%; height:100%; border:none; display:block; background:var(--bg); }
    .file{display:none}
  </style>
<script src="idb_backup.js"></script>
<script src="localStorage_idb_shim.js"></script>
<script src="idb_backup.js"></script>
</head>
<body>
  <div class="sidebar">
    <button id="bHome" class="btn" onclick="go('home.html', this)">HOME</button>
    <button class="btn" onclick="go('worklog.html', this)">업무일지</button>
    <button class="btn" onclick="go('materials.html', this)">자재일지</button>
    <button class="btn" onclick="go('items.html', this)">항목관리</button>
    <button class="btn" onclick="go('schedule.html', this)">일정표</button>
    <button class="btn" onclick="go('timeline.html', this)">타임라인</button>

    
<div class="bottom">
  <button class="small" onclick="APP.exportBackup()">💾 백업</button>
  <button class="small" onclick="document.getElementById('idbRestore').click()">📥 복원</button>
  <input id="idbRestore" class="file" type="file" accept="application/json"/>
</div>

    </div>
  </div>

  <div class="main">
    <iframe id="view" src="home.html" title="viewer"></iframe>
  </div>

  <script src="app_core.js"></script>
  <script>
    let currentFile = 'home.html';

    function setActive(btn){
      document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
      if(btn) btn.classList.add('active');
    }
    function go(file, btn){
      currentFile = file;
      document.getElementById('view').src = file;
      setActive(btn);
    }

    function downloadJson(filename, data){
      const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(()=>URL.revokeObjectURL(a.href), 500);
    }

    function downloadAll(){
      const obj = window.APP.backup.exportAll();
      downloadJson(`backup_all_${window.APP.util.stamp()}.json`, obj);
      window.APP.log.add('BACKUP', '전체백업 다운로드');
    }

    function askRestoreAll(){
      document.getElementById('fileAll').click();
    }

    function restoreAllFromFile(file){
      const r = new FileReader();
      r.onload = ()=>{
        try{
          const obj = JSON.parse(String(r.result||""));
          const mode = confirm('복원 방식 선택\n\n[확인]=기존 데이터 덮어쓰기(전체교체)\n[취소]=기존 데이터에 추가/병합(가능한 경우)') ? 'replace' : 'merge';
          if(mode==='replace'){
            if(!confirm('정말로 전체 데이터를 덮어쓸까요? (되돌리기 어려움)')) return;
          }
          window.APP.backup.importAll(obj, mode);
          alert('복원 완료. (화면을 새로고침하면 즉시 반영됩니다)');
          window.location.reload();
        }catch(e){
          alert('복원 실패: 파일 형식 오류');
        }
      };
      r.readAsText(file, 'utf-8');
    }

    document.getElementById('fileAll').addEventListener('change',(e)=>{
      const f = e.target.files && e.target.files[0];
      if(f) restoreAllFromFile(f);
      e.target.value='';
    });

    window.addEventListener("beforeunload", function (e) {
      e.preventDefault();
      e.returnValue = "";
    });

    function openFull(){
      window.location.href = currentFile;
    }

    // default
    setActive(document.getElementById('bHome'));
  </script>

  <script>
    (function(){
      const upd = () => {
        try{
          const s = document.getElementById('filedbStatus');
          if(!s || !window.APP || !APP.fileDB) return;
          s.textContent = APP.fileDB.isConnected()
            ? ('(파일DB: 연결됨 - ' + (APP.fileDB.getFileName()||'data.json') + ')')
            : '(파일DB: 미연결)';
        }catch(_){}
      };
      window.addEventListener('wlp-filedb-restored', ()=>{
        upd();
        const ifr = document.getElementById('view');
        if(ifr && ifr.contentWindow){
          try{
            if(!sessionStorage.getItem('__wlp_iframe_reloaded')){
              sessionStorage.setItem('__wlp_iframe_reloaded','1');
              ifr.contentWindow.location.reload();
            }
          }catch(_){}
        }
      });
      window.addEventListener('load', ()=>{ setTimeout(upd, 200); });
    })();
  </script>

<script>
document.getElementById('idbRestore').addEventListener('change',(e)=>{
  const f = e.target.files && e.target.files[0];
  if(!f) return;
  APP.importBackup(f);
  e.target.value='';
});
</script>

</body>
</html>
