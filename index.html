<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>WorkLog PRO</title>
  <style>
    :root{
      --bg:#f8fafc;
      --panel:#ffffff;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --blue:#2563eb;
      --red:#ef4444;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text)}
    a{color:inherit}

    /* Top bar */
    .topbar{
      position:fixed; left:0; right:0; top:0; height:56px;
      background:var(--panel); border-bottom:1px solid var(--line);
      display:flex; align-items:center; gap:10px;
      padding:0 12px;
      z-index:9999;
    }
    .brand{font-weight:1000; letter-spacing:.2px}
    .toggle{
      width:38px; height:38px; border-radius:10px;
      background:#f3f4f6; border:1px solid #d1d5db; cursor:pointer;
      font-weight:1000;
    }
    .toggle:hover{background:#e5e7eb}
    .nav{
      display:flex; gap:6px; flex-wrap:wrap; align-items:center;
      overflow:auto;
    }
    .nav button{
      padding:8px 10px; border-radius:10px;
      background:#f9fafb; border:1px solid #d1d5db; cursor:pointer;
      font-weight:900; font-size:13px;
      white-space:nowrap;
    }
    .nav button:hover{background:#eef2ff; border-color:#c7d2fe;}
    .nav button.active{background:#e0e7ff; border-color:#a5b4fc;}
    .rightActions{margin-left:auto; display:flex; gap:8px; align-items:center; flex-wrap:wrap}
    .rightActions button{
      padding:8px 10px; border-radius:10px;
      background:#f3f4f6; border:1px solid #d1d5db; cursor:pointer;
      font-weight:900; font-size:13px;
    }
    .rightActions button.primary{background:var(--blue); color:#fff; border:none}
    .rightActions button.danger{background:var(--red); color:#fff; border:none}
    .status{
      font-size:12px; color:var(--muted);
      padding:6px 10px; border:1px solid var(--line); border-radius:10px;
      background:#fff;
      max-width:280px;
    }

    /* Sidebar (left) */
    .sidebar{
      position:fixed; left:0; top:56px; bottom:0; width:210px;
      background:var(--panel);
      border-right:1px solid var(--line);
      padding:12px;
      display:flex; flex-direction:column; gap:8px;
      z-index:9998;
      transition:transform .18s ease;
    }
    .sidebar.hidden{transform:translateX(-220px)}
    .sideTitle{font-size:12px; color:var(--muted); font-weight:900; margin:6px 4px 2px}
    .sideBtn{
      width:100%;
      padding:10px 12px;
      border-radius:12px;
      background:#f9fafb;
      border:1px solid #d1d5db;
      cursor:pointer;
      font-weight:900;
      text-align:left;
    }
    .sideBtn:hover{background:#eef2ff; border-color:#c7d2fe;}
    .sideBtn.active{background:#e0e7ff; border-color:#a5b4fc;}
    .sideBottom{margin-top:auto; display:flex; flex-direction:column; gap:8px}

    /* Main */
    .main{
      position:fixed;
      left:210px; right:0;
      top:56px; bottom:0;
      transition:left .18s ease;
    }
    .main.full{left:0}
    iframe{
      width:100%; height:100%; border:none; display:block;
      background:var(--bg);
    }
    .file{display:none}

    @media (max-width:900px){
      .sidebar{width:210px}
      .main{left:0}
      .sidebar{transform:translateX(-220px)}
      .sidebar.show{transform:translateX(0)}
    }
  </style>

  <script src="idb_backup.js"></script>
  <script src="localStorage_idb_shim.js"></script>
</head>
<body>
  <!-- Top fixed bar -->
  <div class="topbar">
    <button class="toggle" id="btnToggle" type="button">☰</button>
    <div class="brand">WorkLog PRO</div>

    <div class="nav" aria-label="Quick navigation">
      <button class="active" id="tHome" type="button" onclick="go('home.html', this)">HOME</button>
      <button type="button" onclick="go('worklog.html', this)">업무일지</button>
      <button type="button" onclick="go('materials.html', this)">자재일지</button>
      <button type="button" onclick="go('items.html', this)">항목관리</button>
      <button type="button" onclick="go('schedule.html', this)">일정표</button>
      <button type="button" onclick="go('timeline.html', this)">타임라인</button>
    </div>

    <div class="rightActions">
      <button class="primary" type="button" onclick="APP.exportBackup()">💾 백업</button>
      <button type="button" onclick="document.getElementById('idbRestore').click()">📥 복원</button>
      <input id="idbRestore" class="file" type="file" accept="application/json"/>

      <button type="button" onclick="connectDataFile()">📄 data.json 연결</button>
      <button type="button" onclick="newDataFile()">🆕 data.json 생성</button>
      <div id="filedbStatus" class="status">(파일DB: 미연결)</div>

      <!-- legacy restore UI hook (prevent JS error) -->
      <input id="fileAll" class="file" type="file" accept="application/json"/>
    </div>
  </div>

  <!-- Left sidebar (ERP-style) -->
  <aside class="sidebar" id="sidebar">
    <div class="sideTitle">메뉴</div>
    <button class="sideBtn active" type="button" onclick="go('home.html', this)">HOME</button>
    <button class="sideBtn" type="button" onclick="go('worklog.html', this)">업무일지</button>
    <button class="sideBtn" type="button" onclick="go('materials.html', this)">자재일지</button>
    <button class="sideBtn" type="button" onclick="go('items.html', this)">항목관리</button>
    <button class="sideBtn" type="button" onclick="go('schedule.html', this)">일정표</button>
    <button class="sideBtn" type="button" onclick="go('timeline.html', this)">타임라인</button>

    <div class="sideBottom">
      <div class="sideTitle">빠른작업</div>
      <button class="sideBtn" type="button" onclick="APP.exportBackup()">💾 백업</button>
      <button class="sideBtn" type="button" onclick="document.getElementById('idbRestore').click()">📥 복원</button>
      <button class="sideBtn" type="button" onclick="connectDataFile()">📄 data.json 연결</button>
      <button class="sideBtn" type="button" onclick="newDataFile()">🆕 data.json 생성</button>
    </div>
  </aside>

  <main class="main" id="main">
    <iframe id="view" src="home.html" title="viewer"></iframe>
  </main>

  <script src="app_core.js"></script>
  <script>
    let currentFile = 'home.html';

    function setActive(btn){
      // top buttons
      document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
      if(btn && btn.closest('.nav')) btn.classList.add('active');

      // sidebar buttons
      document.querySelectorAll('.sideBtn').forEach(b=>b.classList.remove('active'));
      if(btn && btn.classList.contains('sideBtn')) btn.classList.add('active');

      // sync both by file name
      try{
        const file = currentFile;
        document.querySelectorAll('.nav button').forEach(b=>{
          const onclick = (b.getAttribute('onclick')||'');
          if(onclick.includes("'" + file + "'")) b.classList.add('active');
        });
        document.querySelectorAll('.sideBtn').forEach(b=>{
          const onclick = (b.getAttribute('onclick')||'');
          if(onclick.includes("'" + file + "'")) b.classList.add('active');
        });
      }catch(_){}
    }

    function go(file, btn){
      currentFile = file;
      document.getElementById('view').src = file;
      setActive(btn);

      // mobile: auto-hide sidebar after selection
      const sb = document.getElementById('sidebar');
      if(window.matchMedia('(max-width:900px)').matches){
        sb.classList.remove('show');
      }
    }

    // Sidebar toggle
    (function(){
      const btn = document.getElementById('btnToggle');
      const sb = document.getElementById('sidebar');
      const main = document.getElementById('main');

      function applyDesktopHidden(hidden){
        sb.classList.toggle('hidden', hidden);
        main.classList.toggle('full', hidden);
        localStorage.setItem('WLP_SIDEBAR_HIDDEN', hidden ? '1' : '0');
      }

      function toggle(){
        if(window.matchMedia('(max-width:900px)').matches){
          sb.classList.toggle('show');
        }else{
          applyDesktopHidden(!sb.classList.contains('hidden'));
        }
      }

      btn.addEventListener('click', toggle);

      // restore state (desktop)
      const saved = localStorage.getItem('WLP_SIDEBAR_HIDDEN') === '1';
      if(!window.matchMedia('(max-width:900px)').matches){
        applyDesktopHidden(saved);
      }
    })();

    // Expose go for iframe pages
    window.go = go;
  </script>
</body>
</html>
